kind: Fixed
body: 'Quoted SQL identifiers that are not valid Python names no longer generate invalid Python. Column fields and parameters sanitize invalid characters to underscores (`"new notes"` -> `new_notes`), digit-leading names get a `column_` prefix (`"3p%"` -> `column_3p_`), table names that would produce a digit-leading, keyword or empty class name get a `Model` prefix, and collisions are deduplicated (classes with a bare digit suffix). Field names (not parameters) also prefix leading underscores because attrs and pydantic treat such fields specially, so a `_meta` column becomes `column__meta`. Digit- or underscore-leading enum values get a `VALUE_` prefix since pyright strict treats leading-underscore members as private. `:copyfrom` escapes quoted identifiers in the emitted column list. Reported by AlexanderHott in issue 160'
time: 2026-07-19T19:00:00.0000000Z
