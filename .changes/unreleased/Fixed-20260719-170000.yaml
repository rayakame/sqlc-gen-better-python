body: 'Row and Params class field names are no longer singularized: a plural column like `outputs` generated an `output` field on v0.4.x, so the field no longer matched the column. Only table names and embed fields (which hold one row of the joined table) are singularized. Note for upgrades: plural-named columns get their actual names back. Diagnosed by Mic92 in PR 164'
