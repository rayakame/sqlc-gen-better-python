version: "2"
plugins:
  - name: python
    wasm:
      url: file://sqlc-gen-better-python.wasm
      sha256: e8326563bbd5bb9786331bccc31021ef2994d5884cbf0b85a1532821e24c2db6
sql:
  - schema: test/schema.sql
    queries: test/queries.sql
    engine: postgresql
    codegen:
      - out: test
        plugin: python
        options:
          package: test
          sql_driver: asyncpg
          model_type: msgspec
          emit_classes: true
          omit_unused_models: false
          emit_init_file: false
          debug: true
          docstrings: numpy
          omit_typechecking_block: false
          overrides:
            - column: authors.bio
              py_type:
                import: collections
                package: UserString
                type: UserString
            - db_type: pg_catalog.numeric
              py_type:
                type: float

