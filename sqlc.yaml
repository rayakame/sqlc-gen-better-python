version: "2"
plugins:
  - name: python
    wasm:
      url: file://sqlc-gen-better-python.wasm
      sha256: 9314a9e57174c34f8f77f2e07a12a271f11fc4038ab18494d78c3607c77f2d3c
sql:
  - schema: test/schema.sql
    queries: test/queries.sql
    engine: postgresql
    codegen:
      - out: test
        plugin: python
        options:
          package: test
          sql_driver: asyncpg
          model_type: msgspec
          emit_classes: true
          omit_unused_models: false
          emit_init_file: false
          debug: true
          docstrings: numpy
          omit_typechecking_block: false
          overrides:
            - column: authors.bio
              py_type:
                import: collections
                package: UserString
                type: UserString
            - db_type: pg_catalog.numeric
              py_type:
                type: float

