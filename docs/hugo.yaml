baseURL: "https://rayakame.github.io/sqlc-gen-better-python/"
title: sqlc-gen-better-python
enableRobotsTXT: true
enableGitInfo: true
hasCJKLanguage: false

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    - name: Search
      weight: 2
      params:
        type: search
    - name: GitHub
      weight: 3
      url: "https://github.com/rayakame/sqlc-gen-better-python"
      params:
        icon: github

params:
  description: A sqlc plugin that generates modern, type-safe Python database code from SQL.
  navbar:
    displayTitle: true
    displayLogo: false
  theme:
    default: system
    displayToggle: true
  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
  editURL:
    enable: true
    base: "https://github.com/rayakame/sqlc-gen-better-python/edit/main/docs/content"
  footer:
    displayCopyright: true
    displayPoweredBy: true
