name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'The version to prepare the release for'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
        default: patch

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Batch changes
        uses: miniscruff/changie-action@11bcad388e7973948cbcecb10863baf024d5f607 # v3
        with:
          version: latest
          args: batch ${{ github.event.inputs.version }}

      - name: Merge changes
        uses: miniscruff/changie-action@11bcad388e7973948cbcecb10863baf024d5f607 # v3
        with:
          version: latest
          args: merge

      - name: Get the latest version
        id: latest
        uses: miniscruff/changie-action@11bcad388e7973948cbcecb10863baf024d5f607 # v3
        with:
          version: latest
          args: latest

      - name: Set version
        env:
          NEW_VERSION: ${{ steps.latest.outputs.output }}
        run: |
          if ! [[ "$NEW_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "unexpected version format: $NEW_VERSION" >&2
            exit 1
          fi
          sed -i 's/^const PluginVersion = ".*"/const PluginVersion = "'"$NEW_VERSION"'"/' internal/config/constants.go

          echo "OK: Updated PluginVersion to $NEW_VERSION"


      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          title: Release ${{ steps.latest.outputs.output }}
          branch: release/${{ steps.latest.outputs.output }}
          commit-message: Release ${{ steps.latest.outputs.output }}
          labels: skip-fragment-check