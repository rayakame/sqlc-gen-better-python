version: "2"
plugins:
  - name: python
    wasm:
      url: file://sqlc-gen-better-python.wasm
      sha256: 237081a0a5dfc42156c4cf1fd9b0d20fe8c4bcbbbcb9f9a18fb31f0151b9505e
sql:
  - schema: schema.sql
    queries:
      - queries.sql
      - queries_enum_override.sql
      - queries_copy_override.sql
      - queries_field_namings.sql
      - queries_invalid_identifiers.sql
    engine: postgresql
    codegen:
      - out: /attrs/classes
        plugin: python
        options:
          package: test.driver_psycopg_async.attrs.classes
          sql_driver: psycopg_async
          model_type: attrs
          emit_classes: true
          omit_unused_models: true
          emit_init_file: true
          docstrings: numpy
          speedups: true
          overrides:
            - column: test_type_override.text_test
              py_type:
                import: collections
                package: UserString
                type: UserString
            - column: test_enum_override.mood_test
              py_type:
                type: str
            - column: test_copy_override.amount
              py_type:
                type: float
  - schema: schema.sql
    queries:
      - queries.sql
      - queries_enum_override.sql
      - queries_copy_override.sql
      - queries_field_namings.sql
      - queries_invalid_identifiers.sql
    engine: postgresql
    codegen:
      - out: /attrs/functions
        plugin: python
        options:
          package: test.driver_psycopg_async.attrs.functions
          sql_driver: psycopg_async
          model_type: attrs
          emit_classes: false
          omit_unused_models: true
          emit_init_file: true
          docstrings: numpy
          speedups: true
          overrides:
            - column: test_type_override.text_test
              py_type:
                import: collections
                package: UserString
                type: UserString
            - column: test_enum_override.mood_test
              py_type:
                type: str
            - column: test_copy_override.amount
              py_type:
                type: float
  - schema: schema.sql
    queries:
      - queries.sql
      - queries_enum_override.sql
      - queries_copy_override.sql
      - queries_field_namings.sql
      - queries_invalid_identifiers.sql
    engine: postgresql
    codegen:
      - out: /dataclass/classes
        plugin: python
        options:
          package: test.driver_psycopg_async.dataclass.classes
          sql_driver: psycopg_async
          model_type: dataclass
          emit_classes: true
          omit_unused_models: true
          emit_init_file: true
          docstrings: google
          overrides:
            - column: test_type_override.text_test
              py_type:
                import: collections
                package: UserString
                type: UserString
            - column: test_enum_override.mood_test
              py_type:
                type: str
            - column: test_copy_override.amount
              py_type:
                type: float
  - schema: schema.sql
    queries:
      - queries.sql
      - queries_enum_override.sql
      - queries_copy_override.sql
      - queries_field_namings.sql
      - queries_invalid_identifiers.sql
      - queries_converters.sql
    engine: postgresql
    codegen:
      - out: /dataclass/functions
        plugin: python
        options:
          package: test.driver_psycopg_async.dataclass.functions
          sql_driver: psycopg_async
          model_type: dataclass
          emit_classes: false
          omit_unused_models: true
          emit_init_file: true
          docstrings: google
          overrides:
            - column: test_type_override.text_test
              py_type:
                import: collections
                package: UserString
                type: UserString
            - column: test_enum_override.mood_test
              py_type:
                type: str
            - column: test_copy_override.amount
              py_type:
                type: float
            - column: test_converters.prefs
              converter: prefs
            - column: test_converters.maybe_prefs
              converter: prefs
            - column: test_converters.tags
              converter: tags
            # db_type (not column) so the converter reaches the ANY($1::type[])
            # parameter, which column overrides are not linked to.
            - db_type: converter_label
              converter: label
          converters:
            - name: prefs
              py_type:
                import: test.converters
                package: Preferences
                type: Preferences
              to_db: test.converters.encode_preferences
              from_db: test.converters.decode_preferences
            - name: tags
              py_type:
                type: frozenset[str]
              to_db: test.converters.encode_tags
              from_db: test.converters.decode_tags
            - name: label
              py_type:
                import: pathlib
                package: PurePosixPath
                type: PurePosixPath
              to_db: test.converters.encode_label
              from_db: test.converters.decode_label
  - schema: schema.sql
    queries:
      - queries.sql
      - queries_enum_override.sql
