version: "2"
plugins:
  - name: python
    wasm:
      url: file://sqlc-gen-better-python.wasm
      sha256: 27bd9b2b2b8d9bdda6ee9419884bb9599c4eb3c0f7dd80c0118fbce0735a09e9
sql:
  - schema: schema.sql
    queries:
      - queries.sql
      - queries_enum_override.sql
      - queries_copy_override.sql
      - queries_field_namings.sql
      - queries_invalid_identifiers.sql
    engine: postgresql
    codegen:
      - out: /attrs/classes
        plugin: python
        options:
          package: test.driver_asyncpg.attrs.classes
          sql_driver: asyncpg
          model_type: attrs
          emit_classes: true
          omit_unused_models: true
          emit_init_file: true
          docstrings: numpy
          speedups: true
          overrides:
            - column: test_type_override.text_test
              py_type:
                import: collections
                package: UserString
                type: UserString
            - column: test_enum_override.mood_test
              py_type:
                type: str
            - column: test_copy_override.amount
              py_type:
                type: float
