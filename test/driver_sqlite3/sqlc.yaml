version: "2"
plugins:
  - name: python
    wasm:
      url: file://sqlc-gen-better-python.wasm
      sha256: 9314a9e57174c34f8f77f2e07a12a271f11fc4038ab18494d78c3607c77f2d3c
sql:
  - schema: schema.sql
    queries:
      - queries.sql
      - queries_override_adapter.sql
      - queries_override_converter.sql
      - queries_case.sql
      - queries_unknown_override.sql
    engine: sqlite
    codegen:
      - out: /attrs/classes
        plugin: python
        options:
          package: test.driver_sqlite3.attrs.classes
          sql_driver: sqlite3
          model_type: attrs
          emit_classes: true
          omit_unused_models: false
          emit_init_file: true
          docstrings: numpy
          speedups: true
          overrides:
            - column: test_type_override.text_test
              py_type:
                import: collections
                package: UserString
                type: UserString
            - column: test_override_conversion.price
              py_type:
                type: float
            - db_type: JULIANDAY
              py_type:
                type: str
