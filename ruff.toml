# Generated code targets Python 3.12+ (PEP 695 type aliases and generics).
target-version = "py312"
# 320 is ruff's maximum. Generated code emits anything longer than this
# exploded with magic trailing commas, so ruff format is a no-op on it.
line-length = 320

[lint]
preview = true
# https://docs.astral.sh/ruff/rules/
select = ["ALL"]
ignore = [
    "missing-trailing-comma", # interferes with the formatter
]


[lint.per-file-ignores]
"test/**" = [
    "line-too-long",
    "too-many-arguments",
    #"D", # Docstrings
    "assert", # use of `assert` detected
    "too-many-statements",
    "suspicious-non-cryptographic-random-usage",
    "too-many-public-methods",
]
"test/**/*test*.py" = [
    "D", # ignore docstrings in test files
    "call-datetime-now-without-tzinfo",
    "call-date-today",
    "call-datetime-without-tzinfo",
    "no-self-use"
]
"noxfile.py" = [
    "D"
]
"scripts/**" = [
    "print",
    "implicit-namespace-package",
]
# Purely generated code
"**/{classes,functions}/*.py" = [
    "missing-copyright-notice",
    "unsorted-imports",
    "boolean-type-hint-positional-argument",
]
# With omit_typechecking_block the annotation-only imports are deliberately
# emitted at runtime so annotations stay introspectable.
"**/omit_tc/{classes,functions}/*.py" = [
    "typing-only-standard-library-import",
]
"**/{msgspec}/{classes,functions}/*.py" = [
    # Ruff doesn't understand that we actually documented the exceptions raised when using pep257
    "docstring-missing-exception",
]


[lint.isort]
required-imports = ["from __future__ import annotations"]
force-single-line = true

[lint.pydocstyle]
convention = "numpy"

